services:
  # ---------------------------------------------------------------
  # Pipeline Node + FFmpeg (recommandé)
  # ---------------------------------------------------------------
  node-api:
    build: .
    image: json2video:latest
    container_name: json2video-node
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_PORT: 3000
      PYTHON_BIN: python3
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      # Monter le service-account GCP en lecture seule si l'app y accède
      - ./credentials:/app/credentials:ro
    command: ["node", "server.js"]
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- http://localhost:3000/ >/dev/null || exit 0"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

